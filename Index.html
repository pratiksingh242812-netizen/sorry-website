
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
overflow:hidden;
}

.container{
background:white;
padding:35px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
max-width:320px;
}

h1{
color:#ff4d6d;
}

#text{
font-size:18px;
color:#333;
min-height:60px;
}

button{
margin:10px;
padding:10px 20px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#444;
color:white;
position:relative;
}

.heart{
position:absolute;
color:red;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<h1>I'm Sorry 🥺</h1>

<p id="text"></p>

<button id="yes" onclick="forgive()">Yes, I forgive you ❤️</button>
<button id="no" onmouseover="move()">No 😒</button>

</div>

<script>

var message="Mujhse sach me galti ho gayi... Tum mere liye bahut important ho. Please mujhe maaf kar do ❤️";

var i=0;

function typing(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(typing,60);
}
}

typing();

function forgive(){
alert("Thank you ❤️ I promise dobara aisa nahi hoga!");
}

function move(){
var btn=document.getElementById("no");
btn.style.position="absolute";
btn.style.top=Math.random()*80+"%";
btn.style.left=Math.random()*80+"%";
}

function hearts(){
var heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},5000);
}

setInterval(hearts,400);

</script>

</body>
</
